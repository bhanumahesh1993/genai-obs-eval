# Langfuse self-hosting now requires a multi-service stack (web, worker,
# ClickHouse, Redis, and S3-compatible storage). Use the official pinned Compose
# from https://langfuse.com/self-hosting. This project's mock transport needs no
# backend at all.
services:
  phoenix:
    image: arizephoenix/phoenix:19.2.0
    ports:
      - "6006:6006"
      - "4317:4317"
